{% extends "base.html" %}

{% block title %}UMS | New Purchase Request{% endblock %}

{% block content %}

<div class="jobs-header">
  <div class="jobs-header-left">
    <span class="eyebrow-label">Procurement</span>
    <h1>Create Purchase Request</h1>
    <p>Manually create a new purchase request.</p>
  </div>

  <div class="jobs-header-right">
    <a href="{{ url_for('purchase_requests') }}" class="dashboard-btn secondary">
      Back to Requests
    </a>
  </div>
</div>

<div class="dashboard-form-card section-spacing">

  <form method="POST" class="form-grid">

    <!-- TITLE -->
    <div class="form-group">
      <label>Title</label>
      <input type="text" name="title" placeholder="Request title..." required>
    </div>

    <!-- ITEM -->
    <div class="form-group">
      <label>Item (optional)</label>
      <select name="item_id" class="custom-select">
        <option value="">Select item</option>
        {% for i in items %}
          <option value="{{ i[0] }}">
            {{ i[1] }} ({{ i[2] }})
          </option>
        {% endfor %}
      </select>
    </div>

    <!-- SUPPLIER -->
    <div class="form-group">
      <label>Supplier</label>
      <select name="supplier_id" class="custom-select">
        <option value="">Select supplier</option>
        {% for s in suppliers %}
          <option value="{{ s[0] }}">{{ s[1] }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- QUANTITY -->
    <div class="form-group">
      <label>Quantity</label>
      <input type="number" step="0.01" name="quantity" required>
    </div>

    <!-- UNIT -->
    <div class="form-group">
      <label>Unit</label>
      <input type="text" name="unit" placeholder="pcs / kg / m²" required>
    </div>

    <!-- PRIORITY -->
    <div class="form-group">
      <label>Priority</label>
      <select name="priority" class="custom-select">
        <option value="low">Low</option>
        <option value="normal" selected>Normal</option>
        <option value="high">High</option>
      </select>
    </div>

    <!-- NEEDED BY -->
    <div class="form-group">
      <label>Needed By</label>
      <input type="date" name="needed_by">
    </div>

    <!-- DESCRIPTION -->
    <div class="form-group full-width">
      <label>Description</label>
      <textarea name="description" rows="3"></textarea>
    </div>

    <!-- NOTES -->
    <div class="form-group full-width">
      <label>Notes</label>
      <textarea name="notes" rows="3"></textarea>
    </div>

    <!-- SUBMIT -->
    <div class="form-actions full-width">
      <button type="submit" class="dashboard-btn primary">
        Create Request
      </button>
    </div>

  </form>

</div>

{% endblock %}
