{% extends "base.html" %}
{% block title %}UMS | Edit Product Group{% endblock %}
{% block content %}
<div class="jobs-header"><div class="jobs-header-left"><span class="eyebrow-label">Products</span><h1>Edit Product Group</h1><p>Rename the group or update the description used across product selection flows.</p></div><div class="jobs-header-right"><a href="{{ url_for('product_groups') }}" class="dashboard-btn secondary">Back to Groups</a></div></div>
<div class="dashboard-form-card product-form-card"><form method="POST" class="order-form"><div class="form-grid"><div class="form-group"><label for="name">Group Name</label><input type="text" id="name" name="name" value="{{ group.name }}" required></div><div class="form-group form-group-full"><label for="description">Description</label><textarea id="description" name="description" rows="5">{{ group.description }}</textarea></div></div><div class="form-actions"><a href="{{ url_for('product_groups') }}" class="dashboard-btn secondary">Cancel</a><button type="submit" class="dashboard-btn primary">Update Group</button></div></form></div>
{% endblock %}
